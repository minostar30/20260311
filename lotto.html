<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #1d1d1f;
            --gray: #86868b;
            --gray-mid: #6e6e73;
            --gray-light: #d2d2d7;
            --gray-bg: #f5f5f7;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }
        body {
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff;
            color: var(--black);
            line-height: 1.5;
        }
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        .content {
            width: 100%;
            max-width: 420px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 1.125rem;
            color: var(--gray);
            font-weight: 400;
            text-align: center;
            margin-bottom: 56px;
        }
        .numbers-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }
        .ball {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.25rem;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ball:nth-child(1) { background: #424245; color: #fff; }
        .ball:nth-child(2) { background: #5e5e62; color: #fff; }
        .ball:nth-child(3) { background: #6e6e73; color: #fff; }
        .ball:nth-child(4) { background: #7d7d82; color: #fff; }
        .ball:nth-child(5) { background: #8e8e93; color: #fff; }
        .ball:nth-child(6) { background: #9e9ea3; color: #fff; }
        .ball.bonus {
            background: var(--black);
            color: #fff;
        }
        .ball.placeholder {
            background: var(--gray-bg);
            color: var(--gray);
            font-weight: 500;
        }
        .btn {
            width: 100%;
            padding: 18px 24px;
            font-size: 1.0625rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            background: var(--black);
            color: #fff;
            transition: background 0.2s, transform 0.15s;
        }
        .btn:hover {
            background: #333;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .history {
            margin-top: 64px;
            padding-top: 48px;
            border-top: 1px solid #e8e8ed;
        }
        .history-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 0;
            border-bottom: 1px solid #f5f5f7;
            font-size: 0.9375rem;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-nums {
            display: flex;
            gap: 8px;
        }
        .history-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .history-num { background: #e8e8ed; color: var(--black); }
        .history-bonus {
            background: var(--black) !important;
            color: #fff !important;
            font-weight: 600;
        }
        .history-time {
            margin-left: auto;
            font-size: 0.8125rem;
            color: var(--gray);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ball.animate {
            animation: fadeUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="content">
            <h1>로또 번호</h1>
            <p class="subtitle">추천 번호를 받아보세요</p>

            <div class="numbers-row" id="numbers">
                <span class="ball placeholder">—</span>
                <span class="ball placeholder">—</span>
                <span class="ball placeholder">—</span>
                <span class="ball placeholder">—</span>
                <span class="ball placeholder">—</span>
                <span class="ball placeholder">—</span>
                <span class="ball bonus placeholder" id="bonusBall">—</span>
            </div>

            <button class="btn" id="generateBtn">추천 받기</button>

            <div class="history" id="history">
                <h2 class="history-title">추천 이력</h2>
                <div id="historyList"></div>
            </div>
        </div>
    </section>

    <script>
        const numbersEl = document.getElementById('numbers');
        const generateBtn = document.getElementById('generateBtn');
        const historyList = document.getElementById('historyList');
        const history = [];

        function getRandomLotto() {
            const nums = new Set();
            while (nums.size < 6) {
                nums.add(Math.floor(Math.random() * 45) + 1);
            }
            const mainNums = Array.from(nums).sort((a, b) => a - b);
            let bonus;
            do {
                bonus = Math.floor(Math.random() * 45) + 1;
            } while (mainNums.includes(bonus));
            return { main: mainNums, bonus };
        }

        function displayNumbers(main, bonus, animate = true) {
            const mainHtml = main.map((n, i) => 
                `<span class="ball${animate ? ' animate' : ''}" style="animation-delay: ${i * 0.06}s">${n}</span>`
            ).join('');
            const bonusHtml = `<span class="ball bonus${animate ? ' animate' : ''}" style="animation-delay: 0.36s">${bonus}</span>`;
            numbersEl.innerHTML = mainHtml + bonusHtml;
        }

        function addToHistory(main, bonus, time) {
            history.unshift({ main, bonus, time });
            if (history.length > 5) history.pop();

            historyList.innerHTML = history.map(({ main, bonus, time }) => {
                const mainHtml = main.map(n => 
                    `<span class="history-num">${n}</span>`
                ).join('');
                return `<div class="history-item">${mainHtml}<span class="history-num history-bonus">+${bonus}</span><span class="history-time">${time}</span></div>`;
            }).join('');
        }

        async function saveToSupabase(main, bonus, source = 'random') {
            try {
                const res = await fetch('/api/save-lotto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ main, bonus, source })
                });
                if (!res.ok) {
                    const err = await res.json();
                    console.warn('저장 실패:', err.error || err);
                }
            } catch (e) {
                console.warn('저장 요청 실패:', e);
            }
        }

        function generate() {
            const { main, bonus } = getRandomLotto();
            const time = new Date().toLocaleTimeString('ko-KR', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
            displayNumbers(main, bonus);
            addToHistory(main, bonus, time);
            saveToSupabase(main, bonus);
        }

        generateBtn.addEventListener('click', generate);
    </script>
</body>
</html>
